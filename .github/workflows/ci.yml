name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the package with test dependencies if available, otherwise fallback
        # As there are no extras defined in pyproject.toml right now, we install manually
        pip install -e .
        pip install pytest pytest-cov numpy pandas scipy scikit-learn matplotlib
        
    - name: Test with pytest
      run: |
        pytest tests/ --cov=pygifi --cov-report=xml
